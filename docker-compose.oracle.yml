services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL}
        APP_ENV: production
    image: web-messenger-allinone:oracle
    container_name: web-messenger-app
    environment:
      SERVERPOD_ENV: production
      SERVERPOD_PORT: 8081
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: ${DATABASE_SSL:-true}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
      APP_BASE_URL: ${APP_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      VERBOSE_BACKEND_LOGS: ${VERBOSE_BACKEND_LOGS:-false}
      ADMIN_DELETE_KEY: ${ADMIN_DELETE_KEY}
    ports:
      - "80:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - uploads_data:/app/backend/uploads

volumes:
  uploads_data:
    driver: local
